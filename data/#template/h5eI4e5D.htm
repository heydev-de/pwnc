<CMS:edit option="repeat">
<div class="module-settings">

  <table>

    <tr>
      <td>%%l_number_of_blocks%%:</td>
      <td><CMS:repeat id="layout_tile_blocks" default="3"></CMS:repeat></td>
    </tr>

  </table>

</div>
</CMS:edit>

<div id="layout-tile-<?=x($cms_template_temp_id)?>" class="layout-tile">

<?php $i = 0;?>

  <CMS:repeat id="layout_tile_blocks" default="3" edit="off"><?php

$i++;
$id = "layout-tile-$cms_template_temp_id-$i";

?><div id="<?=x($id)?>" class="layout-tile-item">

      <CMS:template/>

    </div><?php

?></CMS:repeat>

</div>

<div id="layout-tile-<?=x($cms_template_temp_id)?>-control" class="layout-tile-control">

<?php

$c = (int)$cms_template_document->get($cms_template_base_id . "layout_tile_blocks", "repeat");

for ($i = 1; $i <= $c; $i += 4)
{
    $id = "#layout-tile-$cms_template_temp_id-$i";
    echo("<a href=\"" . x(translate_url($id)) . "\" " .
             (($i === 1) ? "class=\"layout-tile-active\" " : "") .
         "onclick=\"document.getElementById('layout-tile-" . qx($cms_template_temp_id) . "')." .
                   "scrollLeft=document.getElementById('layout-tile-" . qx("$cms_template_temp_id-$i") . "').offsetLeft;" .
                   "return false;\">" .
         x($i) .
         "</a>");
};

?>

</div>

<script>
fx_event_listen(document.getElementById("layout-tile-<?=q($cms_template_temp_id)?>"), "scroll", function()
{
    var items  = this.getElementsByClassName("layout-tile-item");
    var links  = document.getElementById("layout-tile-<?=q($cms_template_temp_id)?>-control").getElementsByTagName("a");
    var scroll = this.scrollLeft;
    var width  = this.offsetWidth / 2;
    var left   = Math.round(scroll - width);
    var right  = Math.round(scroll + width);
    var offset = 0;

    for (var i = 0, j = 0, c = items.length; i < c; i += 4, j++)
    {
        offset = items[i].offsetLeft;
        links[j].className = ((offset > left) && (offset <= right)) ? "layout-tile-active" : "";
    };
});
</script>
