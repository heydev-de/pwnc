<script>
function carousel_<?=x($cms_template_temp_id)?>_highlight(value)
{
    var object = null;
    var i      = 0;
    while ((object = document.getElementById("carousel-<?=x($cms_template_temp_id)?>-" + i)) !== null)
        object.className = (value == i++) ? "carousel-switch-active" : "carousel-switch";
};

function carousel_<?=x($cms_template_temp_id)?>_spin()
{
    if ((document.querySelector("div[id=carousel-<?=x($cms_template_temp_id)?>]:hover") === null) &&
        (document.querySelector("div[id=carousel-<?=x($cms_template_temp_id)?>]:focus-within") === null))
    {
        var i = document.querySelector("input[name=carousel_<?=x($cms_template_temp_id)?>_state]:checked").value;
        var c = <?=max((int)$cms_template_document->get($cms_template_base_id . "r1", "repeat"), 1)?>;
        if (++i == c) i = 0;
        document.getElementById("carousel-<?=x("$cms_template_temp_id")?>-" + i).click();
    };
    setTimeout(carousel_<?=x($cms_template_temp_id)?>_spin, <?=x($speed)?>);
};

carousel_<?=x($cms_template_temp_id)?>_highlight(0);
if (<?=x($speed)?>) setTimeout(carousel_<?=x($cms_template_temp_id)?>_spin, <?=x($speed)?>);
</script>
